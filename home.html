<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- daisy ui and tailwindcss-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- css connection -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body>
    <!-- Navbar section -->

    <section class=" max-w-[1600px]  mx-auto">
        <div class="navbar bg-base-100 shadow-sm p-9">
            <div class="flex-1">
                <div class="flex items-center gap-2 ">
                    <img src="./assets/github-logo.png" alt="" class="max-w-9 max-h-9">
                    <span class="font-semibold text-[1.5rem]">GitHub Issues Tracker</span>
                </div>
            </div>
            <!-- search input -->
            <div class="flex gap-2">
                <label class="input input-bordered flex items-center gap-2 bg-white">
                    <i class="fa-solid fa-magnifying-glass"></i>

                    <input type="text" class="grow" placeholder="Search issues..." />
                </label>

                <div>
                    <button class="btn font-semibold text-[1.2rem] btn-active btn-primary whitespace-nowrap">+ New
                        issue</button>
                </div>
            </div>
        </div>
    </section>

    <!-- hero button -->

    <section class="w-11/12 mx-auto container mt-15">
        <div class="flex gap-2 bg-white p-4 rounded-lg shadow-sm">
            <button class="btn btn-primary px-8">All</button>
            <button class="btn btn-outline px-8">Open</button>
            <button class="btn btn-outline px-8">Closed</button>
        </div>
    </section>

    <!-- hero issues -->
    <section class=" shadow-sm p-4 rounded-lg flex justify-between  container mx-auto mt-4 items-center">
        <div class="flex gap-3 items-center">
            <div class="bg-[#ECE4FF] p-2 rounded-full">
                <img src="./assets/Aperture.png" alt="">
            </div>
            <div>
                <h1 class="font-semibold text-[1.3rem]">50 Issues</h1>
                <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
        </div>

        <div class="flex gap-3">
            <div class="flex gap-3">
                <div><span class=" inline-block w-3 h-3 bg-[#00A96E] rounded-full"></span></div>
                <p>Open</p>
            </div>

            <div class="flex gap-3">
                <div><span class=" inline-block w-3 h-3 bg-[#A855F7] rounded-full"></span></div>
                <p>Close</p>
            </div>

        </div>
    </section>

    <div id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mx-auto container mt-5">


    </div>





    <script src="./script/home.js"></script>
</body>

</html>
